# PhiEx — unified conda environment
#
# Works on:
#   • macOS (Apple Silicon, osx-arm64) — PyTorch MPS available at runtime
#   • Linux (x86_64) — CPU execution only (no CUDA install by design)
#
# One environment, two platforms. The code picks the device at runtime.
#
# Install with mamba (via miniforge) for speed, or stock conda:
#
#     mamba env create -f environment.yml      # ~5 min
#     conda env create -f environment.yml      # ~20 min, same result
#     mamba activate PhiEx
#
# Notes:
#   • `cpuonly` is intentionally omitted. On Linux this means PyTorch's CUDA
#     libs come along for the ride but are never invoked. On macOS it means
#     MPS remains available.
#   • Do not add `pytorch-cuda` here. If you later want CUDA on a Linux GPU
#     node, create a separate `environment-cuda.yml`.
#   • Heavy ML weights (ESMFold, ESM-2, MACE-OFF23) are NOT in this file.
#     They're downloaded on first run into ./models/ — see `make weights`.
#
# OPTIONAL system tools (not on osx-arm64 conda channels — install manually
# only if you want the *real* pipeline rather than the stub):
#
#   p2rank (Java pocket finder) — adapter falls back to a geometric stub if
#                                  not on PATH.  To install the real thing:
#       Linux:   conda install -n PhiEx -c bioconda p2rank
#       macOS:   curl -L -o /tmp/p2rank.tar.gz \
#                  https://github.com/rdk/p2rank/releases/download/2.4.2/p2rank_2.4.2.tar.gz
#                tar xzf /tmp/p2rank.tar.gz -C ~/tools
#                ln -s ~/tools/p2rank_2.4.2/prank /usr/local/bin/prank
#
#   foldseek — adapter falls back to canned APX neighbours if not on PATH.
#       conda install -n PhiEx -c bioconda foldseek    # linux + osx-arm64

name: PhiEx
channels:
  - pytorch
  - conda-forge
  - bioconda

dependencies:
  # ─── Core ───────────────────────────────────────────────
  - python=3.11
  - pip
  # PyTorch's conda build for osx-arm64 is compiled against NumPy 1.x;
  # NumPy 2 silently breaks the C API.  Pin to <2 until pytorch ships
  # a NumPy-2 build.
  - numpy<2

  # ─── Web backend ────────────────────────────────────────
  - fastapi
  - uvicorn
  - httpx
  - pydantic
  - sse-starlette

  # ─── Scientific core ────────────────────────────────────
  # (numpy is pinned <2 above for PyTorch ABI compatibility)
  - scipy
  - pandas
  - scikit-learn
  - numba
  - matplotlib
  - omegaconf       # required by fair-esm's ESMFold loader

  # ─── Structural bio ─────────────────────────────────────
  - mdanalysis
  - biopython
  - openmm
  - pdbfixer
  - openff-toolkit
  - rdkit

  # ─── PyTorch (MPS on Mac, CPU on Linux) ─────────────────
  - pytorch::pytorch
  - pytorch::torchvision
  - pytorch::torchaudio

  # ─── Pocket detection / docking ─────────────────────────
  # p2rank is omitted here — no osx-arm64 build on bioconda.  Adapter
  # falls back to a geometric stub.  See header for manual-install steps.
  - vina
  - openjdk=17        # required if you later install p2rank manually

  # ─── Dynamics / statistics ──────────────────────────────
  - deeptime

  # ─── Bridges OpenMM <-> PyTorch (conda-only, not on PyPI) ───
  - openmm-ml

  # ─── pip-only dependencies (install last) ───────────────
  # Several ML packages are pip-only or have inconsistent conda coverage
  # across osx-arm64 / linux-64; pinning them here keeps one yml.
  - pip:
      - fair-esm            # ESM-2 and ESMFold (pip canonical)
      - mace-torch          # MACE-OFF ML potential
      - scikit-optimize     # Bayesian acquisition for active learning
